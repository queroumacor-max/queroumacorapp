<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Sem conexao - QueroUmaCor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #f4f4f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 420px; }
    h1 { font-size: 1.5rem; margin: 0 0 12px; color: #ff6b35; }
    p { font-size: 1rem; line-height: 1.5; margin: 0 0 8px; opacity: 0.85; }
    .hint { font-size: 0.85rem; opacity: 0.6; margin-top: 16px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Sem conexao</h1>
    <p>Voce esta offline no momento.</p>
    <p>Reconecte sua internet e reabra o app.</p>
    <p class="hint">QueroUmaCor</p>
  </main>
</body>
</html>
