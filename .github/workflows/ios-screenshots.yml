name: iOS Screenshots via Simulator

on:
  workflow_dispatch:

jobs:
  screenshots:
    name: Take iOS Screenshots
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Boot simulator
        run: |
          echo "=== Available simulators ==="
          xcrun simctl list devices available | grep -E 'iPhone (15 Plus|15 Pro Max|16 Plus|16 Pro Max|14 Plus|14 Pro Max)'
          # Try to get a large-screen iPhone (generates 1290x2796 screenshots - accepted as 6.5")
          SIM_ID=$(xcrun simctl list devices available | grep -E 'iPhone (16 Plus|15 Plus|14 Plus)' | grep -v unavailable | head -1 | awk -F'[()]' '{print $2}')
          if [ -z "$SIM_ID" ]; then
            SIM_ID=$(xcrun simctl list devices available | grep -E 'iPhone (16 Pro Max|15 Pro Max|14 Pro Max)' | grep -v unavailable | head -1 | awk -F'[()]' '{print $2}')
          fi
          if [ -z "$SIM_ID" ]; then
            SIM_ID=$(xcrun simctl list devices available | grep 'iPhone' | grep -v unavailable | head -1 | awk -F'[()]' '{print $2}')
          fi
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Using simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID" || true
          # Open Simulator.app so the display actually renders (prevents black screenshots)
          open -a Simulator
          sleep 20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          npm install
          npm install --prefix next-app

      - name: Add Capacitor iOS
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          git checkout HEAD -- ios/App/App/Info.plist ios/App/App/PrivacyInfo.xcprivacy ios/App/App/AppDelegate.swift

      - name: Install CocoaPods
        run: cd ios/App && pod install

      - name: Build app for simulator
        run: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            BUILD_DIR=$RUNNER_TEMP/sim-build

      - name: Install app and take screenshots
        run: |
          APP_PATH=$(find $RUNNER_TEMP/sim-build -name '*.app' -path '*/Debug-iphonesimulator/*' | head -1)
          echo "App path: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"
          BUNDLE_ID=$(defaults read "$APP_PATH/Info.plist" CFBundleIdentifier 2>/dev/null || echo 'br.com.queroumacor.app')
          echo "Bundle ID: $BUNDLE_ID"
          # Launch app and wait longer for WebView to fully render
          xcrun simctl launch booted "$BUNDLE_ID"
          echo "Waiting 45s for app to fully load..."
          sleep 45
          mkdir -p screenshots
          xcrun simctl io booted screenshot screenshots/01-home.png
          echo "Screenshot 1 taken"
          sleep 8
          xcrun simctl io booted screenshot screenshots/02-screen2.png
          echo "Screenshot 2 taken"
          sleep 8
          xcrun simctl io booted screenshot screenshots/03-screen3.png
          echo "Screenshot 3 taken"
          echo "Screenshots captured:"
          ls -la screenshots/
          # Show dimensions
          for f in screenshots/*.png; do
            echo "Dimensions of $f:"
            sips -g pixelWidth -g pixelHeight "$f"
          done

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-screenshots
          path: screenshots/
          if-no-files-found: error
