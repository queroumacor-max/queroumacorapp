name: Conventions

# Lint leve das convenções do projeto (item #18 do audit). Roda em todo
# push e em PRs pra qualquer branch — warn-only por enquanto (sem --strict),
# então NÃO bloqueia merge. Quando todas as WARNs forem zeradas e quisermos
# gate, basta trocar pra `node scripts/check-conventions.js --strict`.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conventions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventions:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # Sem deps novas (script usa só node:fs/path). `npm ci` só pra ter o
      # ambiente preparado caso queiramos rodar testes de convenção no mesmo
      # job no futuro.
      - name: Install dependencies
        run: npm ci

      - name: Convention checks (warn-only)
        run: node scripts/check-conventions.js
