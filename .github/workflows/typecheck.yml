name: Typecheck

# tsc --checkJs sobre os arquivos novos modulares (db/policies/errors/logger/
# config/utils/events/schemas/functions/scripts). Pega TDZ-like bugs, no-undef
# real e type mismatches que ESLint não vê. Vanilla legacy (app.js, head.js,
# shims.js, modules/*) seguem fora — migração gradual.
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # typecheck
      - name: Type check (tsc --checkJs)
        run: npm run typecheck
        continue-on-error: false
