name: CI

# Roda em toda branch que NÃO é main (main já tem o deploy.yml) e em PRs
# direcionados pra main. Falha bloqueia o merge (se branch protection ligar).
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: next-app
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Fail-fast em vulnerabilidades HIGH/CRITICAL de prod deps. Roda
      # cedo pra não desperdiçar tempo de lint/test se já temos CVE
      # bloqueante. --omit=dev ignora devDeps (não vão pro browser).
      - name: npm audit (fail-fast)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      # ESLint via next lint (config em .eslintrc.json).
      - name: ESLint
        run: npm run lint
        continue-on-error: false

      # TypeScript check.
      - name: TypeScript
        run: npm run typecheck

      # Tests (Vitest).
      - name: Tests (Vitest)
        run: npm test
