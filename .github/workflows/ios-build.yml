name: iOS Build & Upload to App Store Connect

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (CFBundleVersion) e.g. 1'
        required: true
        default: '1'

jobs:
  build-ios:
    name: Build & Upload iOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: |
          npm install
          npm install --prefix next-app

      - name: Add Capacitor iOS platform
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          git checkout HEAD -- ios/App/App/Info.plist ios/App/App/PrivacyInfo.xcprivacy ios/App/App/AppDelegate.swift ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json

      - name: Generate App Icons
        run: |
          ICON_SRC="icon-512.png"
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          echo "Generating app icons from $ICON_SRC..."
          sips -z 40 40   "$ICON_SRC" --out "$ICON_DIR/AppIcon-20@2x.png"
          sips -z 60 60   "$ICON_SRC" --out "$ICON_DIR/AppIcon-20@3x.png"
          sips -z 58 58   "$ICON_SRC" --out "$ICON_DIR/AppIcon-29@2x.png"
          sips -z 87 87   "$ICON_SRC" --out "$ICON_DIR/AppIcon-29@3x.png"
          sips -z 80 80   "$ICON_SRC" --out "$ICON_DIR/AppIcon-40@2x.png"
          sips -z 120 120 "$ICON_SRC" --out "$ICON_DIR/AppIcon-40@3x.png"
          sips -z 120 120 "$ICON_SRC" --out "$ICON_DIR/AppIcon-60@2x.png"
          sips -z 180 180 "$ICON_SRC" --out "$ICON_DIR/AppIcon-60@3x.png"
          sips -z 20 20   "$ICON_SRC" --out "$ICON_DIR/AppIcon-20.png"
          sips -z 40 40   "$ICON_SRC" --out "$ICON_DIR/AppIcon-20@2x-ipad.png"
          sips -z 29 29   "$ICON_SRC" --out "$ICON_DIR/AppIcon-29.png"
          sips -z 58 58   "$ICON_SRC" --out "$ICON_DIR/AppIcon-29@2x-ipad.png"
          sips -z 40 40   "$ICON_SRC" --out "$ICON_DIR/AppIcon-40.png"
          sips -z 80 80   "$ICON_SRC" --out "$ICON_DIR/AppIcon-40@2x-ipad.png"
          sips -z 76 76   "$ICON_SRC" --out "$ICON_DIR/AppIcon-76.png"
          sips -z 152 152 "$ICON_SRC" --out "$ICON_DIR/AppIcon-76@2x.png"
          sips -z 167 167 "$ICON_SRC" --out "$ICON_DIR/AppIcon-83.5@2x.png"
          sips -z 1024 1024 "$ICON_SRC" --out "$ICON_DIR/AppIcon-1024.png"
          echo "App icons generated successfully."
          ls -la "$ICON_DIR/"
          # Add CFBundleIconName to Info.plist if not already present
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" ios/App/App/Info.plist
          echo "CFBundleIconName set to AppIcon"

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          echo "Decoded profile size: $(wc -c < $PP_PATH) bytes"
          # Use hardcoded known UUID and name to avoid security cms parsing issues
          PP_UUID="99fb8b7a-6e34-47fb-9e75-177452b7a48c"
          PP_NAME="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}"
          echo "Provisioning profile UUID: $PP_UUID"
          echo "Provisioning profile Name: $PP_NAME"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning profile installed."

      - name: Set CFBundleVersion
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" ios/App/App/Info.plist

      - name: Configure App signing in project
        env:
          PP_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: python3 scripts/patch_pbxproj.py

      - name: Archive (xcodebuild)
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/QueroUmaCor.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain"

      - name: Export IPA
        run: |
          PP_UUID_VAL="$PP_UUID"
          cat > $RUNNER_TEMP/ExportOptions.plist << ENDOFPLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>br.com.queroumacor.app</key>
              <string>$PP_UUID_VAL</string>
            </dict>
          </dict>
          </plist>
          ENDOFPLIST
          echo "PP_UUID from env: $PP_UUID_VAL"
          cat $RUNNER_TEMP/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/QueroUmaCor.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        env:
          ASC_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          ASC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/App.ipa \
            -t ios \
            -u "$ASC_USERNAME" \
            -p "$ASC_PASSWORD" \
            --output-format xml

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain || true
