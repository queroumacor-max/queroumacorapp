name: iOS Build & Upload to App Store Connect

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (CFBundleVersion) e.g. 1'
        required: true
        default: '1'

jobs:
  build-ios:
    name: Build & Upload iOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install --prefix next-app

      - name: Add Capacitor iOS platform
        env:
          NODE_PATH: ./next-app/node_modules
        run: |
          rm -rf ios
          ./next-app/node_modules/.bin/cap add ios
          git checkout HEAD -- \
            ios/App/App/Info.plist \
            ios/App/App/PrivacyInfo.xcprivacy \
            ios/App/App/AppDelegate.swift \
            ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json
          ruby -i -e 'c=STDIN.read; c.sub!(/post_install do \|installer\|/, "post_install do |installer|\n  installer.pods_project.targets.each { |t| t.build_configurations.each { |bc| bc.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"; bc.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\" } }"); print c' ios/App/Podfile

      - name: Install CocoaPods
        run: |
          ln -sf next-app/node_modules node_modules
          cd ios/App
          pod install --repo-update

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$CERTIFICATE_BASE64" | base64 -d > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i $PP_PATH 2>/dev/null | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          if [ -z "$PP_UUID" ]; then
            echo "ERROR: Could not extract UUID from provisioning profile"
            exit 1
          fi
          echo "Profile UUID: $PP_UUID"
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision

      - name: Set CFBundleVersion
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" ios/App/App/Info.plist

      - name: Configure App signing in project
        env:
          PP_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PBXPROJ=ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' $PBXPROJ
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' $PBXPROJ
          perl -i -pe "s|CODE_SIGN_STYLE = Manual;|CODE_SIGN_STYLE = Manual;\nCODE_SIGN_IDENTITY = \"iPhone Distribution\";\nDEVELOPMENT_TEAM = $ENV{TEAM_ID};\nPROVISIONING_PROFILE_SPECIFIER = \"\$ENV{PP_NAME}\";|g" $PBXPROJ

      - name: Archive (xcodebuild)
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/QueroUmaCor.xcarchive \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/build.keychain"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLISTEOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/QueroUmaCor.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          APP_STORE_CONNECT_PASSWORD: ${{ secrets.APP_STORE_CONNECT_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/App.ipa \
            -t ios \
            -u "$APP_STORE_CONNECT_USERNAME" \
            -p "$APP_STORE_CONNECT_PASSWORD" \
            --output-format xml

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
