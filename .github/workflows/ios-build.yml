name: iOS Build & Upload to App Store Connect

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (CFBundleVersion) e.g. 1'
        required: true
        default: '1'

jobs:
  build-ios:
    name: Build & Upload iOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install npm dependencies (includes @capacitor/cli, typescript, etc.)
      - name: Install npm dependencies
        run: npm install --prefix next-app

      # 4. cap add ios - remove existing ios/ first, use NODE_PATH for TypeScript
      - name: Add Capacitor iOS platform
        env:
          NODE_PATH: ./next-app/node_modules
        run: |
          rm -rf ios
          ./next-app/node_modules/.bin/cap add ios
          git checkout HEAD -- \
            ios/App/App/Info.plist \
            ios/App/App/PrivacyInfo.xcprivacy \
            ios/App/App/AppDelegate.swift \
            ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json

      # 5. Install CocoaPods
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update

      # 6. Import Apple Distribution Certificate
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      # 7. Install Provisioning Profile
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # 8. Set build number
      - name: Set CFBundleVersion
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" \
            ios/App/App/Info.plist

      # 9. xcodebuild archive
      - name: Archive (xcodebuild)
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/QueroUmaCor.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      # 10. Export IPA
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadSymbols</key><true/>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          PLISTEOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/QueroUmaCor.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # 11. Upload to App Store Connect via altool
      - name: Upload to App Store Connect
        env:
          ASC_USERNAME: ${{ secrets.APP_STORE_CONNECT_USERNAME }}
          ASC_PASSWORD: ${{ secrets.APP_STORE_CONNECT_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/QueroUmaCor.ipa" \
            --username "$ASC_USERNAME" \
            --password "$ASC_PASSWORD" \
            --verbose

      # 12. Cleanup keychain
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain || true
